global:
  scrape_interval: 15s
  evaluation_interval: 30s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - <HOST IP Address>:8000
        labels:
          service: vllm
          env: prod
          stack: vllm-observability
          instance_name: gpt-oss-120b-a

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090