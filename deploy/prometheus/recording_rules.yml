          )

      # Instance decode time p95.
      - record: latency:decode_time:p95:instance
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, instance_name, model_name, env, region) (
              rate(vllm:request_decode_time_seconds_bucket[5m])
            )
          )

      # Global TTFT p95.
      - record: latency:ttft:p95:global
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, env, region) (
              rate(vllm:time_to_first_token_seconds_bucket[5m])
            )
          )

      # Global TTFT p99.
      - record: latency:ttft:p99:global
