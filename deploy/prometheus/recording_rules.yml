groups:
  - name: semantic_usage
    interval: 30s
    rules:
      # =================================================
      # Semantic family: usage
      # Contract: business usage accounting from counters.
      # Ordering: instance -> model -> global.
      # =================================================

      # Instance request rate excluding aborted requests.
      - record: usage:requests:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:request_success_total{finished_reason=~"stop|length"}[5m])
          )

      # Instance request increase excluding aborted requests.
      - record: usage:requests:increase1h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[1h])
          )

      # Instance rolling request total excluding aborted requests.
      - record: usage:requests:rolling24h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[24h])
          )

      # Instance prompt token rate.
      - record: usage:prompt_tokens:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )

      # Instance prompt token increase.
      - record: usage:prompt_tokens:increase1h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )

      # Instance rolling prompt token total.
      - record: usage:prompt_tokens:rolling24h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )

      # Instance generation token rate.
      - record: usage:generation_tokens:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Instance generation token increase.
      - record: usage:generation_tokens:increase1h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Instance rolling generation token total.
      - record: usage:generation_tokens:rolling24h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

      # Instance combined token rate.
      - record: usage:tokens:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )
          +
          sum by (instance_name, model_name, env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Instance combined token increase.
      - record: usage:tokens:increase1h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )
          +
          sum by (instance_name, model_name, env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Instance rolling combined token total.
      - record: usage:tokens:rolling24h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )
          +
          sum by (instance_name, model_name, env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

      # Model request rate excluding aborted requests.
      - record: usage:requests:rate5m:model
        expr: |
          sum by (model_name, env, region) (
            rate(vllm:request_success_total{finished_reason=~"stop|length"}[5m])
          )

      # Model request increase excluding aborted requests.
      - record: usage:requests:increase1h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[1h])
          )

      # Model rolling request total excluding aborted requests.
      - record: usage:requests:rolling24h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[24h])
          )

      # Model prompt token rate.
      - record: usage:prompt_tokens:rate5m:model
        expr: |
          sum by (model_name, env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )

      # Model prompt token increase.
      - record: usage:prompt_tokens:increase1h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )

      # Model rolling prompt token total.
      - record: usage:prompt_tokens:rolling24h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )

      # Model generation token rate.
      - record: usage:generation_tokens:rate5m:model
        expr: |
          sum by (model_name, env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Model generation token increase.
      - record: usage:generation_tokens:increase1h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Model rolling generation token total.
      - record: usage:generation_tokens:rolling24h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

      # Model combined token rate.
      - record: usage:tokens:rate5m:model
        expr: |
          sum by (model_name, env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )
          +
          sum by (model_name, env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Model combined token increase.
      - record: usage:tokens:increase1h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )
          +
          sum by (model_name, env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Model rolling combined token total.
      - record: usage:tokens:rolling24h:model
        expr: |
          sum by (model_name, env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )
          +
          sum by (model_name, env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

      # Global request rate excluding aborted requests.
      - record: usage:requests:rate5m:global
        expr: |
          sum by (env, region) (
            rate(vllm:request_success_total{finished_reason=~"stop|length"}[5m])
          )

      # Global request increase excluding aborted requests.
      - record: usage:requests:increase1h:global
        expr: |
          sum by (env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[1h])
          )

      # Global rolling request total excluding aborted requests.
      - record: usage:requests:rolling24h:global
        expr: |
          sum by (env, region) (
            increase(vllm:request_success_total{finished_reason=~"stop|length"}[24h])
          )

      # Global prompt token rate.
      - record: usage:prompt_tokens:rate5m:global
        expr: |
          sum by (env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )

      # Global prompt token increase.
      - record: usage:prompt_tokens:increase1h:global
        expr: |
          sum by (env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )

      # Global rolling prompt token total.
      - record: usage:prompt_tokens:rolling24h:global
        expr: |
          sum by (env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )

      # Global generation token rate.
      - record: usage:generation_tokens:rate5m:global
        expr: |
          sum by (env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Global generation token increase.
      - record: usage:generation_tokens:increase1h:global
        expr: |
          sum by (env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Global rolling generation token total.
      - record: usage:generation_tokens:rolling24h:global
        expr: |
          sum by (env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

      # Global combined token rate.
      - record: usage:tokens:rate5m:global
        expr: |
          sum by (env, region) (
            rate(vllm:prompt_tokens_total[5m])
          )
          +
          sum by (env, region) (
            rate(vllm:generation_tokens_total[5m])
          )

      # Global combined token increase.
      - record: usage:tokens:increase1h:global
        expr: |
          sum by (env, region) (
            increase(vllm:prompt_tokens_total[1h])
          )
          +
          sum by (env, region) (
            increase(vllm:generation_tokens_total[1h])
          )

      # Global rolling combined token total.
      - record: usage:tokens:rolling24h:global
        expr: |
          sum by (env, region) (
            increase(vllm:prompt_tokens_total[24h])
          )
          +
          sum by (env, region) (
            increase(vllm:generation_tokens_total[24h])
          )

  - name: semantic_runtime
    interval: 30s
    rules:
      # =================================================
      # Semantic family: runtime
      # Contract: queueing, concurrency, cache, preemption.
      # Ordering: instance -> model -> global.
      # Note: this family currently exposes instance/global outputs.
      # =================================================

      # Instance running request count.
      - record: runtime:requests_running:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            vllm:num_requests_running
          )

      # Instance waiting request count.
      - record: runtime:requests_waiting:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            vllm:num_requests_waiting
          )

      # Instance KV cache usage percentage.
      - record: runtime:kv_cache_usage_perc:instance
        expr: |
          max by (instance_name, model_name, env, region) (
            vllm:kv_cache_usage_perc
          )

      # Instance prefix cache query rate.
      - record: runtime:prefix_cache_queries:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:prefix_cache_queries_total[5m])
          )

      # Instance prefix cache hit rate numerator.
      - record: runtime:prefix_cache_hits:rate5m:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            rate(vllm:prefix_cache_hits_total[5m])
          )

      # Instance prefix cache hit rate ratio.
      - record: runtime:prefix_cache_hit_rate5m:instance
        expr: |
          (
            sum by (instance_name, model_name, env, region) (
              rate(vllm:prefix_cache_hits_total[5m])
            )
          )
          /
          clamp_min(
            sum by (instance_name, model_name, env, region) (
              rate(vllm:prefix_cache_queries_total[5m])
            ),
            1
          )

      # Instance preemption increase.
      - record: runtime:preemptions:increase1h:instance
        expr: |
          sum by (instance_name, model_name, env, region) (
            increase(vllm:num_preemptions_total[1h])
          )

      # Global running request count.
      - record: runtime:requests_running:global
        expr: |
          sum by (env, region) (
            vllm:num_requests_running
          )

      # Global waiting request count.
      - record: runtime:requests_waiting:global
        expr: |
          sum by (env, region) (
            vllm:num_requests_waiting
          )

      # Global KV cache usage percentage.
      - record: runtime:kv_cache_usage_perc:global
        expr: |
          max by (env, region) (
            vllm:kv_cache_usage_perc
          )

      # Global prefix cache hit rate ratio.
      - record: runtime:prefix_cache_hit_rate5m:global
        expr: |
          (
            sum by (env, region) (
              rate(vllm:prefix_cache_hits_total[5m])
            )
          )
          /
          clamp_min(
            sum by (env, region) (
              rate(vllm:prefix_cache_queries_total[5m])
            ),
            1
          )

      # Global preemption increase.
      - record: runtime:preemptions:increase1h:global
        expr: |
          sum by (env, region) (
            increase(vllm:num_preemptions_total[1h])
          )

  - name: semantic_latency
    interval: 30s
    rules:
      # =================================================
      # Semantic family: latency
      # Contract: histogram-based latency percentiles.
      # Ordering: instance -> model -> global.
      # Note: this family currently exposes instance/global outputs.
      # =================================================

      # Instance TTFT p95.
      - record: latency:ttft:p95:instance
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, instance_name, model_name, env, region) (
              rate(vllm:time_to_first_token_seconds_bucket[5m])
            )
          )

      # Instance TTFT p99.
      - record: latency:ttft:p99:instance
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, instance_name, model_name, env, region) (
              rate(vllm:time_to_first_token_seconds_bucket[5m])
            )
          )

      # Instance ITL p95.
      - record: latency:itl:p95:instance
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, instance_name, model_name, env, region) (
              rate(vllm:inter_token_latency_seconds_bucket[5m])
            )
          )

      # Instance ITL p99.
      - record: latency:itl:p99:instance
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, instance_name, model_name, env, region) (
              rate(vllm:inter_token_latency_seconds_bucket[5m])
