  - name: semantic_service
    interval: 30s
    rules:
      # =================================================
      # Semantic family: service
      # Contract: raw scrape state plus business-day schedule.
      # Ordering: instance -> model -> global.
      # Note: this family exposes instance/global outputs plus schedule signals.
      # =================================================

      # Instance raw up state from Prometheus scrape health.
      - record: service:up:raw:instance
        expr: |
          max by (instance_name, env, region, job) (
            up{job="vllm"}
          )

      # Instance availability during expected business days.
      - record: service:availability:business_hours:instance
        expr: |
          max by (instance_name, env, region, job) (
            up{job="vllm"}
          )
          *
          on()
          group_left()
          service:business_day:asia_taipei

      # Asia/Taipei business-day schedule signal.
      - record: service:business_day:asia_taipei
        expr: |
          (
            (day_of_week(vector(time() + 8 * 3600)) >= 1)
            and
            (day_of_week(vector(time() + 8 * 3600)) <= 5)
          )

      # Expected availability derived from business-day schedule.
      - record: service:expected_up:business_hours
        expr: |
          service:business_day:asia_taipei

      # Global raw up state from Prometheus scrape health.
      - record: service:up:raw:global
        expr: |
          max by (env, region, job) (
            up{job="vllm"}
          )

      # Global availability during expected business days.
      - record: service:availability:business_hours:global
        expr: |
          max by (env, region, job) (
            up{job="vllm"}
          )
          *
          on()
          group_left()
          service:business_day:asia_taipei

  - name: semantic_http
    interval: 30s
    rules:
      # =================================================
      # Semantic family: http
      # Contract: API traffic, error, and latency signals.
      # Ordering: instance -> model -> global.
      # Note: this family currently exposes instance/global outputs.
      # =================================================

      # Instance HTTP request rate by handler, method, and status.
      - record: http:requests:rate5m:instance
        expr: |
          sum by (instance_name, env, region, handler, method, status) (
            rate(http_requests_total[5m])
          )

      # Instance chat completion request rate by status.
      - record: http:chat_completions:requests:rate5m:instance
        expr: |
          sum by (instance_name, env, region, status) (
            rate(http_requests_total{handler="/v1/chat/completions",method="POST"}[5m])
          )

      # Instance chat completion error rate.
      - record: http:chat_completions:error_rate5m:instance
        expr: |
          (
            sum by (instance_name, env, region) (
              rate(http_requests_total{handler="/v1/chat/completions",method="POST",status=~"4xx|5xx"}[5m])
            )
          )
          /
          clamp_min(
            sum by (instance_name, env, region) (
              rate(http_requests_total{handler="/v1/chat/completions",method="POST"}[5m])
            ),
            1
          )

      # Instance chat completion latency p95.
      - record: http:chat_completions:latency:p95:instance
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, instance_name, env, region) (
              rate(http_request_duration_highr_seconds_bucket[5m])
            )
          )

      # Global HTTP request rate by handler, method, and status.
      - record: http:requests:rate5m:global
        expr: |
          sum by (env, region, handler, method, status) (
            rate(http_requests_total[5m])
          )

      # Global chat completion request rate by status.
      - record: http:chat_completions:requests:rate5m:global
        expr: |
          sum by (env, region, status) (
            rate(http_requests_total{handler="/v1/chat/completions",method="POST"}[5m])
          )

      # Global chat completion error rate.
      - record: http:chat_completions:error_rate5m:global
        expr: |
          (
            sum by (env, region) (
              rate(http_requests_total{handler="/v1/chat/completions",method="POST",status=~"4xx|5xx"}[5m])
            )
          )
          /
          clamp_min(
            sum by (env, region) (
              rate(http_requests_total{handler="/v1/chat/completions",method="POST"}[5m])
            ),
            1
          )

      # Global chat completion latency p95.
      - record: http:chat_completions:latency:p95:global
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, env, region) (
              rate(http_request_duration_highr_seconds_bucket[5m])
            )
          )
