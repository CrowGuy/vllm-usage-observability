          histogram_quantile(
            0.99,
            sum by (le, env, region) (
              rate(vllm:time_to_first_token_seconds_bucket[5m])
            )
          )

      # Global ITL p95.
      - record: latency:itl:p95:global
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, env, region) (
